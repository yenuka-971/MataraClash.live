<svg class="cyber-ball-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <defs>
        <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="clash-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="45%" stop-color="#ffd700" />
            <stop offset="55%" stop-color="#00f0ff" />
        </linearGradient>
    </defs>

    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#clash-grad)" stroke-width="2" stroke-dasharray="15 8 4 8" opacity="0.8"/>
    <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <g filter="url(#glow-gold)" stroke="#ffd700" stroke-width="2.5" fill="none">
        <path d="M 100 20 L 55 55 L 55 145 L 100 180" />
        <path d="M 55 55 L 85 90 L 85 125 L 55 145" />
        <path d="M 100 20 L 85 90" />
        <path d="M 100 180 L 85 125" />
        <path d="M 25 100 L 55 55" />
        <path d="M 25 100 L 55 145" />
        <path d="M 25 100 L 75 100" opacity="0.6"/>
    </g>

    <g filter="url(#glow-cyan)" stroke="#00f0ff" stroke-width="2.5" fill="none">
        <path d="M 100 20 L 145 55 L 145 145 L 100 180" />
        <path d="M 145 55 L 115 90 L 115 125 L 145 145" />
        <path d="M 100 20 L 115 90" />
        <path d="M 100 180 L 115 125" />
        <path d="M 175 100 L 145 55" />
        <path d="M 175 100 L 145 145" />
        <path d="M 175 100 L 125 100" opacity="0.6"/>
    </g>

    <path d="M 100 10 L 100 190" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.9" />

    <path d="M 20 30 L 20 20 L 30 20" fill="none" stroke="#ffd700" stroke-width="2"/>
    <path d="M 180 170 L 180 180 L 170 180" fill="none" stroke="#00f0ff" stroke-width="2"/>
    
    <text x="32" y="103" fill="#ffd700" font-family="monospace" font-size="12" font-weight="bold" opacity="0.8">R</text>
    <text x="160" y="103" fill="#00f0ff" font-family="monospace" font-size="12" font-weight="bold" opacity="0.8">T</text>
</svg>