<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matara Clash | LIVE MATCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="live-match-body">
    <div class="live-match-container">
        <div class="match-title-live">⚡ THE GOLDEN-BLUE ENCOUNTER 2026 ⚡</div>
        
        <div class="live-scoreboard-board">
            <div class="team-block-popup home">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img id="live-home-logo" class="live-team-logo" src="" alt="Home Logo" style="display: none; width: 50px; height: 50px; object-fit: contain;">
                    <span class="team-name-popup" id="live-home-name">RAHULA</span>
                </div>
                <span class="score-digit-popup" id="live-home-score">0</span>
            </div>
            <div class="timer-block-popup">
                <span class="clock-popup" id="live-timer">20:00</span>
                <span class="elapsed-popup" id="live-elapsed">⏱ 00:00</span>
                <span class="live-tag-popup">LIVE MATRICES</span>
            </div>
            <div class="team-block-popup away">
                <span class="score-digit-popup" id="live-away-score">0</span>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span class="team-name-popup" id="live-away-name">ST. THOMAS'</span>
                    <img id="live-away-logo" class="live-team-logo" src="" alt="Away Logo" style="display: none; width: 50px; height: 50px; object-fit: contain;">
                </div>
            </div>
        </div>

        <div class="live-video-wrapper">
            <iframe id="live-youtube-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="live-stats-bar">
            <span class="possession-text" id="live-pos-home">RAHULA (50%)</span>
            <div class="pos-bar-bg"><div class="pos-bar-fill" id="live-pos-bar" style="width:50%"></div></div>
            <span class="possession-text" id="live-pos-away">ST. THOMAS' (50%)</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
